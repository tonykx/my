<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada Foco</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #3b82f6; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background-color: var(--card); padding: 2.5rem; border-radius: 16px; text-align: center; max-width: 450px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .counter { font-size: 3rem; font-weight: 800; color: var(--accent); margin-bottom: 0.5rem; }
        .btn { padding: 1rem 2rem; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-start { background: var(--accent); color: white; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        #quote { font-style: italic; color: #94a3b8; margin: 20px 0; min-height: 50px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Tela de Início -->
        <div id="start-view">
            <h1>Nova Jornada</h1>
            <p id="quote">"Carregando motivação..."</p>
            <button class="btn btn-start" onclick="iniciarJornada()">Iniciar Jornada</button>
        </div>

        <!-- Tela do Contador -->
        <div id="counter-view" style="display:none;">
            <h1>Jornada Ativa</h1>
            <div class="counter" id="days-count">0d</div>
            <div id="time-detail" style="color: #94a3b8;">00h 00m 00s</div>
            <button class="btn btn-danger" onclick="resetCounter()" style="margin-top: 2rem;">Recair / Reiniciar</button>
        </div>
    </div>

    <script>
        const TOKEN = "7827502328:AAFXfSmGE72ss7U7E_e7VUb_9v0yieAdsgY";
        const CHAT_ID = "6005814454";
        const frases = [
            "A disciplina é a ponte entre metas e realizações.",
            "Cada segundo longe disso é uma vitória sobre si mesmo.",
            "Sua mente é sua ferramenta, não sua escrava.",
            "O controle absoluto começa com uma pequena decisão."
        ];

        document.getElementById('quote').innerText = frases[Math.floor(Math.random() * frases.length)];

        function checkStatus() {
            if (localStorage.getItem('startDate')) {
                document.getElementById('start-view').style.display = 'none';
                document.getElementById('counter-view').style.display = 'block';
                atualizarContador();
            } else {
                document.getElementById('start-view').style.display = 'block';
                document.getElementById('counter-view').style.display = 'none';
            }
        }

        function iniciarJornada() {
            localStorage.setItem('startDate', new Date().getTime());
            localStorage.setItem('metasEnviadas', JSON.stringify({}));
            enviarTelegram("🚀 *Jornada iniciada!* Você tomou a decisão de mudar. Vamos em frente.");
            checkStatus();
        }

        function enviarTelegram(msg) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: "Markdown" })
            });
        }

        function atualizarContador() {
            const start = parseInt(localStorage.getItem('startDate'));
            if (!start) return;

            const diff = new Date().getTime() - start;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days-count').innerText = `${d}d`;
            document.getElementById('time-detail').innerText = `${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;

            // Lógica metas
            const metas = JSON.parse(localStorage.getItem('metasEnviadas'));
            if (h >= 12 && d === 0 && !metas['12h']) { enviarTelegram("🌓 Meta 12h: Foco total!"); metas['12h']=true; }
            if (d >= 1 && !metas['1d']) { enviarTelegram("🔥 24h limpo! O vício perde força."); metas['1d']=true; }
            localStorage.setItem('metasEnviadas', JSON.stringify(metas));
        }

        function resetCounter() {
            if (confirm("Deseja mesmo resetar o contador?")) {
                enviarTelegram("⚠️ Contador reiniciado. Recomeçar é parte do crescimento.");
                localStorage.removeItem('startDate');
                checkStatus();
            }
        }

        setInterval(atualizarContador, 1000);
        checkStatus();
    </script>
</body>
</html>
