<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dias de Liberdade</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#121212;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#1f1f1f;padding:24px;border-radius:16px;max-width:420px;width:90%;text-align:center;box-shadow:0 0 20px #0006}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none;font-size:16px}
button{background:#2e7d32;color:#fff;font-weight:bold;cursor:pointer}
#app{display:none}
.time{font-size:28px;font-weight:bold;margin:15px 0}
.small{opacity:.8}
</style>
</head>
<body>
<div class="card" id="setup">
<h1>Dias de Liberdade</h1>
<p>Qual vício você quer acompanhar?</p>
<input id="vicio" placeholder="Ex.: Pornografia, cigarro...">
<button onclick="start()">Iniciar Jornada</button>
</div>

<div class="card" id="app">
<h2 id="titulo"></h2>
<div class="time" id="contador"></div>
<p class="small">Início: <span id="inicio"></span></p>
<button onclick="resetar()">Recaí</button>
<button onclick="alterar()">Alterar vício</button>
</div>

<script>
function start(){
 const v=document.getElementById('vicio').value.trim();
 if(!v)return alert('Digite um vício.');
 localStorage.setItem('vicio',v);
 localStorage.setItem('inicio',Date.now());
 carregar();
}
function carregar(){
 const v=localStorage.getItem('vicio');
 const i=localStorage.getItem('inicio');
 if(!v||!i)return;
 setup.style.display='none';
 app.style.display='block';
 titulo.textContent='Livre de: '+v;
 inicio.textContent=new Date(Number(i)).toLocaleString('pt-BR');
 atualizar();
 setInterval(atualizar,1000);
}
function atualizar(){
 const d=Date.now()-Number(localStorage.getItem('inicio'));
 const s=Math.floor(d/1000)%60,m=Math.floor(d/60000)%60,h=Math.floor(d/3600000)%24,di=Math.floor(d/86400000);
 contador.textContent=`${di} dias ${h}h ${m}m ${s}s`;
}
function resetar(){
 if(confirm('Tem certeza?')){
 localStorage.setItem('inicio',Date.now());
 carregar();
 }
}
function alterar(){
 localStorage.clear();
 location.reload();
}
carregar();
</script>
</body>
</html>
